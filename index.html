<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau Croisé Dynamique</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#fafaf9;--surface:#fff;--surface2:#f4f4f2;--border:#e4e4e0;--border-dark:#ccccc6;--text:#1a1a18;--text-2:#6b6b65;--text-3:#a8a8a0;--accent:#1a56db;--accent-bg:#eff4ff;--green:#0a6640;--green-bg:#ecfdf5;--amber:#92400e;--amber-bg:#fffbeb;--rose:#9f1239;--rose-bg:#fff1f2}
  html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
  .app{display:grid;grid-template-rows:44px 1fr;height:100vh;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10}
  .topbar-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text-2);letter-spacing:.06em;text-transform:uppercase}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--border-dark);transition:background .3s}
  .status-dot.live{background:#16a34a}
  #status-text{font-size:11px;color:var(--text-3)}
  .spacer{flex:1}
  .topbar select{font-family:'DM Mono',monospace;font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);cursor:pointer;outline:none}
  .topbar label{font-size:11px;color:var(--text-2)}
  .btn-export{font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-2);cursor:pointer}
  .btn-export:hover{background:var(--surface2)}
  .body{display:grid;grid-template-columns:200px 1fr;overflow:hidden}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
  .sidebar::-webkit-scrollbar{width:4px}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .sb-section{padding:12px;border-bottom:1px solid var(--border)}
  .sb-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .sb-label-dot{width:7px;height:7px;border-radius:50%}
  .d-green{background:#16a34a}.d-blue{background:var(--accent)}.d-purple{background:#7c3aed}.d-amber{background:#d97706}
  .drop-zone{min-height:34px;border:1.5px dashed var(--border);border-radius:8px;padding:4px 5px;display:flex;flex-wrap:wrap;gap:4px;align-items:flex-start;transition:all .15s;background:var(--bg)}
  .drop-zone.drag-over{border-color:var(--accent);background:var(--accent-bg)}
  .drop-zone:empty::after{content:attr(data-ph);font-size:11px;color:var(--text-3);padding:4px 3px;font-style:italic}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;cursor:grab;user-select:none;white-space:nowrap;max-width:150px;overflow:hidden}
  .chip span{overflow:hidden;text-overflow:ellipsis}
  .chip:hover{opacity:.8}
  .chip-r{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
  .chip-c{background:var(--accent-bg);color:var(--accent);border:1px solid #bfdbfe}
  .chip-v{background:#f5f3ff;color:#5b21b6;border:1px solid #ddd6fe}
  .chip-f{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a}
  .chip-rm{background:none;border:none;cursor:pointer;color:inherit;opacity:.45;font-size:14px;line-height:1;padding:0}
  .chip-rm:hover{opacity:1}
  .field-list{padding:8px;display:flex;flex-direction:column;gap:2px;flex:1}
  .field-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;border:1px solid transparent;cursor:grab;font-size:12px;user-select:none;transition:background .1s}
  .field-item:hover{background:var(--surface2);border-color:var(--border)}
  .field-item.used{opacity:.3;cursor:not-allowed;pointer-events:none}
  .field-type{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:1px 5px;border-radius:4px}
  .ft-n{background:var(--accent-bg);color:var(--accent)}
  .ft-s{background:var(--green-bg);color:var(--green)}
  .ft-d{background:var(--rose-bg);color:var(--rose)}
  .field-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filter-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
  .filter-row label{font-size:11px;color:var(--text-2);flex-shrink:0;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
  .filter-row select{flex:1;font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;outline:none;min-width:0}
  .main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
  .pivot-wrap{flex:1;overflow:auto;padding:16px}
  .pivot-wrap::-webkit-scrollbar{width:6px;height:6px}
  .pivot-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text-3);text-align:center;padding:20px}
  .empty-icon{width:48px;height:48px;border:1.5px dashed var(--border-dark);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .empty-state p{font-size:12px;max-width:240px;line-height:1.6}
  .empty-state strong{color:var(--text-2);font-weight:500}
  .loading{display:flex;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text-2)}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pvt-table{border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums;background:var(--surface);border-radius:10px;overflow:hidden;min-width:100%}
  .pvt-table th,.pvt-table td{border:1px solid var(--border);padding:6px 14px;white-space:nowrap}
  .pvt-table th{background:var(--surface2);font-weight:500;text-align:left;position:sticky;top:0;z-index:2;font-size:11px;color:var(--text-2)}
  .pvt-table th.col-h{text-align:center;color:var(--accent)}
  .pvt-table th.row-h{left:0;z-index:3}
  .pvt-table td.row-label{background:var(--surface);font-weight:500;position:sticky;left:0;z-index:1;border-right:2px solid var(--border)}
  .pvt-table tbody tr:hover td{background:#f0f9ff}
  .pvt-table tbody tr:hover td.row-label{background:#e0f2fe}
  .pvt-table td.val{text-align:right;color:var(--text-2)}
  .pvt-table td.val.has-val{color:var(--text)}
  .pvt-table td.null-val{text-align:right;color:var(--border-dark)}
  .pvt-table tfoot th,.pvt-table tfoot td{background:#f0fdf4;font-weight:500;color:var(--green);position:sticky;bottom:0;border-top:2px solid #bbf7d0}
  .pvt-table tfoot th{z-index:3;left:0}
  .pvt-table .grand-total{color:var(--green)!important;font-weight:600}
  .stats-bar{display:flex;gap:16px;align-items:center;padding:8px 16px;border-top:1px solid var(--border);background:var(--surface)}
  .stat-item{display:flex;gap:5px;align-items:baseline}
  .stat-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
  .stat-lbl{font-size:11px;color:var(--text-3)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="topbar-title">TCD</span>
    <span style="color:var(--border-dark)">/</span>
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">En attente de Grist…</span>
    <div class="spacer"></div>
    <label>Agrégation</label>
    <select id="agg-sel" onchange="buildPivot()">
      <option value="sum">Somme</option><option value="cnt">Nombre</option>
      <option value="avg">Moyenne</option><option value="min">Min</option><option value="max">Max</option>
    </select>
    <label>Totaux</label>
    <select id="tot-sel" onchange="buildPivot()">
      <option value="both">Lig. + Col.</option><option value="r">Lignes</option>
      <option value="c">Colonnes</option><option value="none">Aucun</option>
    </select>
    <label>Tri</label>
    <select id="srt-sel" onchange="buildPivot()">
      <option value="la">Libellé ↑</option><option value="ld">Libellé ↓</option>
      <option value="vd">Valeur ↓</option><option value="va">Valeur ↑</option>
    </select>
    <button class="btn-export" onclick="exportCSV()">↓ CSV</button>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="sb-section">
        <div class="sb-label"><span class="sb-label-dot d-green"></span>Lignes</div>
        <div class="drop-zone" id="zone-r" data-zone="r" data-ph="Déposer un champ…"></div>
      </div>
      <div class="sb-section">
        <div class="sb-label"><span class="sb-label-dot d-blue"></span>Colonnes</div>
        <div class="drop-zone" id="zone-c" data-zone="c" data-ph="Déposer un champ…"></div>
      </div>
      <div class="sb-section">
        <div class="sb-label"><span class="sb-label-dot d-purple"></span>Valeurs</div>
        <div class="drop-zone" id="zone-v" data-zone="v" data-ph="Champ numérique…"></div>
      </div>
      <div class="sb-section">
        <div class="sb-label"><span class="sb-label-dot d-amber"></span>Filtres</div>
        <div class="drop-zone" id="zone-f" data-zone="f" data-ph="Déposer un champ…"></div>
      </div>
      <div class="sb-section" id="filter-values-section" style="display:none">
        <div class="sb-label">Valeurs filtre</div>
        <div id="filter-values-list"></div>
      </div>
      <div class="sb-section" style="padding-bottom:4px">
        <div class="sb-label" id="fields-label">Champs</div>
      </div>
      <div class="field-list" id="field-list"></div>
    </div>
    <div class="main">
      <div class="pivot-wrap" id="pivot-out">
        <div class="loading" id="loading-state">
          <div class="spinner"></div><span>Connexion à Grist…</span>
        </div>
      </div>
      <div class="stats-bar" id="stats-bar" style="display:none">
        <div class="stat-item"><span class="stat-val" id="st-rows">—</span><span class="stat-lbl">lignes</span></div>
        <div class="stat-item"><span class="stat-val" id="st-cols">—</span><span class="stat-lbl">colonnes</span></div>
        <div class="stat-item"><span class="stat-val" id="st-cells">—</span><span class="stat-lbl">cellules</span></div>
        <div class="stat-item"><span class="stat-val" id="st-total">—</span><span class="stat-lbl">total</span></div>
      </div>
    </div>
  </div>
</div>
<script>
var rawData=[],columns=[],colTypes={},cfg={r:[],c:[],v:[],f:[]},filterValues={},dragField=null,dragSrc=null;
grist.ready({requiredAccess:'read table',columns:[]});
grist.onRecords(function(records){
  if(!records||!records.length){showEmpty('Table vide.');return}
  rawData=records;
  var first=records[0];
  columns=Object.keys(first).filter(function(k){return k!=='id'});
  inferTypes();
  document.getElementById('status-dot').classList.add('live');
  document.getElementById('status-text').textContent=records.length.toLocaleString('fr')+' enreg. · '+columns.length+' champs';
  renderFieldList();renderZones();buildPivot();
});
grist.onOptions&&grist.onOptions(function(o){if(o&&o.cfg){cfg=o.cfg;renderZones();renderFieldList();buildPivot()}});
function showEmpty(m){document.getElementById('pivot-out').innerHTML='<div class="empty-state"><div class="empty-icon">⊞</div><p>'+m+'</p></div>'}
function inferTypes(){
  colTypes={};
  columns.forEach(function(col){
    var s=rawData.slice(0,100).map(function(r){return r[col]}).filter(function(v){return v!==null&&v!==undefined&&v!==''});
    var n=s.filter(function(v){return typeof v==='number'||(!isNaN(parseFloat(v))&&isFinite(v))}).length;
    var d=s.filter(function(v){return typeof v==='string'&&/^\d{4}-\d{2}-\d{2}/.test(v)}).length;
    if(!s.length){colTypes[col]='s';return}
    if(n/s.length>0.75)colTypes[col]='n';
    else if(d/s.length>0.5)colTypes[col]='d';
    else colTypes[col]='s';
    if(colTypes[col]==='n')rawData.forEach(function(r){var n=parseFloat(r[col]);r[col]=isNaN(n)?null:n});
  });
}
function renderFieldList(){
  var list=document.getElementById('field-list');
  var used=new Set(cfg.r.concat(cfg.c).concat(cfg.v).concat(cfg.f));
  document.getElementById('fields-label').textContent='Champs ('+columns.filter(function(c){return!used.has(c)}).length+'/'+columns.length+')';
  list.innerHTML='';
  columns.forEach(function(col){
    var t=colTypes[col]||'s',inUse=used.has(col);
    var item=document.createElement('div');
    item.className='field-item'+(inUse?' used':'');item.draggable=!inUse;item.dataset.field=col;
    item.innerHTML='<span class="field-type ft-'+t+'">'+t+'</span><span class="field-name" title="'+col+'">'+col+'</span>';
    if(!inUse)item.addEventListener('dragstart',function(e){dragField=col;dragSrc='fields';e.dataTransfer.effectAllowed='move'});
    list.appendChild(item);
  });
}
function renderZones(){
  [{key:'r',cls:'chip-r'},{key:'c',cls:'chip-c'},{key:'v',cls:'chip-v'},{key:'f',cls:'chip-f'}].forEach(function(d){
    var zone=document.getElementById('zone-'+d.key);zone.innerHTML='';
    cfg[d.key].forEach(function(f){zone.appendChild(makeChip(f,d.cls,d.key))});
  });
  setupZones();renderFilterSelects();
}
function makeChip(field,cls,zone){
  var chip=document.createElement('div');chip.className='chip '+cls;chip.draggable=true;chip.dataset.field=field;chip.dataset.src=zone;
  chip.innerHTML='<span>'+field+'</span><button class="chip-rm">×</button>';
  chip.addEventListener('dragstart',function(e){dragField=field;dragSrc=zone;e.dataTransfer.effectAllowed='move'});
  chip.querySelector('.chip-rm').addEventListener('click',function(e){
    e.stopPropagation();cfg[zone]=cfg[zone].filter(function(x){return x!==field});
    if(zone==='f')delete filterValues[field];
    renderZones();renderFieldList();buildPivot();saveOpts();
  });
  return chip;
}
function setupZones(){
  document.querySelectorAll('.drop-zone').forEach(function(z){
    z.addEventListener('dragover',function(e){e.preventDefault();z.classList.add('drag-over')});
    z.addEventListener('dragleave',function(){z.classList.remove('drag-over')});
    z.addEventListener('drop',function(e){
      e.preventDefault();z.classList.remove('drag-over');
      var zn=z.dataset.zone;if(!dragField)return;
      if(dragSrc&&dragSrc!=='fields'){cfg[dragSrc]=cfg[dragSrc].filter(function(x){return x!==dragField});if(dragSrc==='f')delete filterValues[dragField]}
      if(!cfg[zn].includes(dragField)){cfg[zn].push(dragField);if(zn==='f')initFV(dragField)}
      dragField=null;dragSrc=null;renderZones();renderFieldList();buildPivot();saveOpts();
    });
  });
}
function saveOpts(){grist.setOptions&&grist.setOptions({cfg:cfg})}
function initFV(field){
  var vals=[...new Set(rawData.map(function(r){return r[field]}).filter(function(v){return v!==null&&v!==undefined&&v!==''}))].sort(function(a,b){return String(a).localeCompare(String(b),'fr',{numeric:true})});
  filterValues[field]={opts:vals,sel:'__all__'};
}
function renderFilterSelects(){
  var sec=document.getElementById('filter-values-section'),list=document.getElementById('filter-values-list');
  if(!cfg.f.length){sec.style.display='none';return}
  sec.style.display='';list.innerHTML='';
  cfg.f.forEach(function(field){
    var fv=filterValues[field];if(!fv)return;
    var row=document.createElement('div');row.className='filter-row';
    var lb=document.createElement('label');lb.textContent=field;lb.title=field;
    var sel=document.createElement('select');
    sel.innerHTML='<option value="__all__">Tout</option>'+fv.opts.map(function(v){return'<option value="'+v+'"'+(fv.sel===String(v)?' selected':'')+'>'+v+'</option>'}).join('');
    sel.addEventListener('change',function(){filterValues[field].sel=sel.value;buildPivot()});
    row.appendChild(lb);row.appendChild(sel);list.appendChild(row);
  });
}
function filtered(){return rawData.filter(function(row){return cfg.f.every(function(field){var fv=filterValues[field];if(!fv||fv.sel==='__all__')return true;return String(row[field])===fv.sel})})}
function aggFn(arr,fn){
  if(!arr||!arr.length)return null;
  if(fn==='sum')return arr.reduce(function(s,v){return s+v},0);
  if(fn==='cnt')return arr.length;
  if(fn==='avg')return arr.reduce(function(s,v){return s+v},0)/arr.length;
  if(fn==='min')return Math.min.apply(null,arr);
  if(fn==='max')return Math.max.apply(null,arr);
}
function fmt(v,fn){
  if(v===null||v===undefined)return'—';
  if(fn==='cnt')return Math.round(v).toLocaleString('fr');
  if(Number.isInteger(v))return v.toLocaleString('fr');
  return parseFloat(v.toFixed(2)).toLocaleString('fr');
}
function buildPivot(){
  var out=document.getElementById('pivot-out');
  if(!rawData.length){out.innerHTML='<div class="empty-state"><div class="empty-icon">⊞</div><p>En attente des données Grist…</p></div>';return}
  if(!cfg.r.length&&!cfg.c.length&&!cfg.v.length){out.innerHTML='<div class="empty-state"><div class="empty-icon">⊕</div><p>Glissez des champs vers <strong>Lignes</strong>, <strong>Colonnes</strong> et <strong>Valeurs</strong>.</p></div>';document.getElementById('stats-bar').style.display='none';return}
  var fn=document.getElementById('agg-sel').value,tots=document.getElementById('tot-sel').value,srt=document.getElementById('srt-sel').value;
  var data=filtered();
  var rKey=function(row){return(cfg.r.length?cfg.r:['__all__']).map(function(f){var v=row[f];return v===null||v===undefined?'(vide)':String(v)}).join(' › ')};
  var cKey=function(row){return cfg.c.length?cfg.c.map(function(f){var v=row[f];return v===null||v===undefined?'(vide)':String(v)}).join(' › '):'(valeur)'};
  var rowKeys=[...new Set(data.map(rKey))],colKeys=cfg.c.length?[...new Set(data.map(cKey))]:['(valeur)'];
  var cm={};
  data.forEach(function(row){var r=rKey(row),c=cKey(row),k=r+'||'+c;if(!cm[k])cm[k]=[];var val=cfg.v.length?row[cfg.v[0]]:1;cm[k].push(typeof val==='number'?val:(parseFloat(val)||0))});
  var mat={};
  rowKeys.forEach(function(r){mat[r]={};colKeys.forEach(function(c){mat[r][c]=aggFn(cm[r+'||'+c],fn)})});
  var rTot=function(r){return colKeys.reduce(function(s,c){return s+(mat[r][c]||0)},0)};
  var rows=[...rowKeys];
  if(srt==='la')rows.sort(function(a,b){return a.localeCompare(b,'fr',{numeric:true})});
  else if(srt==='ld')rows.sort(function(a,b){return b.localeCompare(a,'fr',{numeric:true})});
  else if(srt==='vd')rows.sort(function(a,b){return rTot(b)-rTot(a)});
  else rows.sort(function(a,b){return rTot(a)-rTot(b)});
  var sCols=[...colKeys].sort(function(a,b){return a.localeCompare(b,'fr',{numeric:true})});
  var t=document.createElement('table');t.className='pvt-table';
  var thead=t.createTHead(),tbody=t.createTBody(),tfoot=t.createTFoot();
  var hr=thead.insertRow(),rhC=Math.max(cfg.r.length,1);
  if(cfg.r.length){cfg.r.forEach(function(f){var th=document.createElement('th');th.className='row-h';th.textContent=f;th.style.minWidth='110px';hr.appendChild(th)})}
  else{var th=document.createElement('th');th.className='row-h';th.textContent=cfg.v[0]||'—';hr.appendChild(th)}
  sCols.forEach(function(c){var th=document.createElement('th');th.className='col-h';th.textContent=c;th.style.minWidth='90px';hr.appendChild(th)});
  if(tots==='both'||tots==='r'){var th=document.createElement('th');th.className='col-h grand-total';th.textContent='Total';hr.appendChild(th)}
  rows.forEach(function(rk){
    var tr=tbody.insertRow();
    if(cfg.r.length){var parts=rk.split(' › ');cfg.r.forEach(function(f,i){var td=tr.insertCell();td.className='row-label';td.textContent=parts[i]||''})}
    else{var td=tr.insertCell();td.className='row-label';td.textContent=rk}
    var rs=0;
    sCols.forEach(function(c){var td=tr.insertCell(),v=mat[rk][c];if(v===null||v===undefined){td.className='null-val';td.textContent='—'}else{td.className='val has-val';td.textContent=fmt(v,fn);rs+=v}});
    if(tots==='both'||tots==='r'){var td=tr.insertCell();td.className='val grand-total';td.textContent=fmt(rs,fn)}
  });
  if(tots==='both'||tots==='c'){
    var fr=tfoot.insertRow(),th=document.createElement('th');th.colSpan=rhC;th.textContent='Total';fr.appendChild(th);
    var gT=0;
    sCols.forEach(function(c){var s=rows.reduce(function(sum,r){return sum+(mat[r][c]||0)},0);gT+=s;var td=fr.insertCell();td.textContent=fmt(s,fn)});
    if(tots==='both'){var td=fr.insertCell();td.className='grand-total';td.textContent=fmt(gT,fn)}
  }
  out.innerHTML='';out.appendChild(t);
  var gT2=rows.reduce(function(s,r){return s+rTot(r)},0);
  document.getElementById('stats-bar').style.display='flex';
  document.getElementById('st-rows').textContent=rows.length.toLocaleString('fr');
  document.getElementById('st-cols').textContent=sCols.length.toLocaleString('fr');
  document.getElementById('st-cells').textContent=(rows.length*sCols.length).toLocaleString('fr');
  document.getElementById('st-total').textContent=fmt(gT2,fn);
}
function exportCSV(){
  var table=document.querySelector('.pvt-table');if(!table)return;
  var csv='';
  table.querySelectorAll('tr').forEach(function(tr){csv+=Array.from(tr.querySelectorAll('th,td')).map(function(c){return'"'+c.textContent.replace(/"/g,'""')+'"'}).join(';')+'\n'});
  var b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tcd_grist.csv';a.click();
}
</script>
